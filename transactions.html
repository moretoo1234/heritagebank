<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions - Heritage Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-btn i { color: #1a472a; }
        h1 { color: #1a472a; }

        .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .toolbar-left { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .input { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; min-width: 240px; }
        .btn { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #1a472a; color: white; }
        .btn-primary:hover { background: #2d5f3f; }
        .btn-secondary { background: #d4af37; color: #1a472a; }
        .btn-secondary:hover { background: #c19b2e; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        th { color: #1a472a; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { color: #333; font-size: 14px; }
        .muted { color: #777; font-size: 12px; }
        .amount.credit { color: #28a745; font-weight: 700; }
        .amount.debit { color: #dc3545; font-weight: 700; }

        .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .pill.completed { background: #d4edda; color: #155724; }
        .pill.pending { background: #fff3cd; color: #856404; }
        .pill.failed { background: #f8d7da; color: #721c24; }

        /* Global word-wrap */
        h1, h2, h3, h4, p, span, td, th { overflow-wrap: break-word; word-wrap: break-word; }

        .empty { padding: 40px; text-align: center; color: #666; }
        .empty i { font-size: 42px; color: #ddd; display: block; margin-bottom: 10px; }

        @media (max-width: 700px) {
            .container { padding: 15px; margin: 15px auto; }
            .input { min-width: 0; width: 100%; }
            .toolbar { gap: 8px; }
            .toolbar-left { width: 100%; }
            th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) { display: none; }
            h1 { font-size: 1.2rem; }
            .card { padding: 15px 12px; overflow-x: auto; }
            th { padding: 10px 6px; font-size: 11px; }
            td { padding: 10px 6px; font-size: 12px; }
            .pill { font-size: 10px; padding: 3px 7px; }
            .muted { font-size: 11px; }
            .btn { padding: 8px 10px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .container { padding: 10px; margin: 10px auto; }
            h1 { font-size: 1.05rem; }
            th:nth-child(5), td:nth-child(5) { display: none; }
            th { padding: 8px 4px; font-size: 10px; }
            td { padding: 8px 4px; font-size: 11px; }
            .toolbar { flex-direction: column; }
            .toolbar-left { flex-direction: column; }
            .input { min-width: 0; width: 100%; }
            .btn { width: 100%; justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='dashboard.html'" title="Back to Dashboard"><i class="fas fa-arrow-left"></i></button>
            <div>
                <h1>Transactions</h1>
                <div class="muted">Full transaction history (latest 100)</div>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="toolbar-left">
                    <input class="input" id="search" placeholder="Search description, reference, type…" oninput="applyFilter()" />
                    <button class="btn btn-secondary" onclick="refresh()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                <button class="btn btn-primary" onclick="downloadCurrentStatement()"><i class="fas fa-file-invoice"></i> Download Statement</button>
            </div>

            <div id="tableWrap"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3001'
            : '';

        let userId = null;
        let allTx = [];

        function formatMoney(amount) {
            const v = Number(amount || 0);
            return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function cleanType(type) {
            const map = { 'direct_deposit': 'Direct Deposit', 'admin_transfer': 'Transfer', 'admin_debit': 'Debit', 'admin_credit': 'Credit', 'wire_transfer': 'Wire Transfer', 'bank_transfer': 'Bank Transfer' };
            if (map[(type || '').toLowerCase()]) return map[(type || '').toLowerCase()];
            return (type || 'Transfer').replace(/_/g, ' ').replace(/\badmin\b\s*/gi, '').replace(/\b\w/g, c => c.toUpperCase()).trim() || 'Transfer';
        }

        function formatDate(d) {
            try {
                return new Date(d).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch {
                return '-';
            }
        }

        function pill(status) {
            const s = (status || 'completed').toLowerCase();
            const cls = (s === 'completed' || s === 'success') ? 'completed' : (s === 'pending' ? 'pending' : 'failed');
            return `<span class="pill ${cls}">${s}</span>`;
        }

        function isCredit(tx) {
            return tx.type === 'credit' || tx.type === 'deposit' || tx.type === 'received';
        }

        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                location.href = 'signin.html';
                return;
            }

            const profileRes = await fetch(`${API_URL}/api/auth/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
            const profile = await profileRes.json();
            if (!profile.success || !profile.user) {
                location.href = 'signin.html';
                return;
            }
            userId = profile.user.id;
            await refresh();
        }

        async function refresh() {
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_URL}/api/user/${userId}/transactions`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            allTx = (data && data.success && Array.isArray(data.transactions)) ? data.transactions : [];
            applyFilter();
        }

        function applyFilter() {
            const q = (document.getElementById('search').value || '').trim().toLowerCase();
            const filtered = !q
                ? allTx
                : allTx.filter(t => {
                    const hay = `${t.description || ''} ${t.reference || ''} ${t.type || ''}`.toLowerCase();
                    return hay.includes(q);
                });
            renderTable(filtered);
        }

        function renderTable(list) {
            const wrap = document.getElementById('tableWrap');
            if (!list.length) {
                wrap.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-receipt"></i>
                        <div>No transactions found.</div>
                    </div>
                `;
                return;
            }

            wrap.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Type</th>
                            <th>Reference</th>
                            <th>Status</th>
                            <th style="text-align:right;">Amount</th>
                            <th>Receipt</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${list.map(tx => {
                            const credit = isCredit(tx);
                            const cls = credit ? 'credit' : 'debit';
                            const sign = credit ? '+' : '-';
                            const date = tx.createdAt || tx.date || tx.created_at;
                            // Clean up description - remove "Admin" references and parse UK bank transfers
                            let desc = tx.description || tx.type || 'Transaction';
                            desc = desc.replace(/Admin\s*/gi, '').trim() || tx.type || 'Transaction';
                            // Parse UK bank transfer description for cleaner display
                            const ukMatch = desc.match(/UK Bank Transfer to ([^|]+)\s*\|\s*Recipient:\s*([^|]+)/);
                            let fromTo = `From: ${tx.fromFirstName || ''} ${tx.fromLastName || ''} • To: ${tx.toFirstName || ''} ${tx.toLastName || ''}`;
                            if (ukMatch) {
                                const bankName = ukMatch[1].trim();
                                const recipientName = ukMatch[2].trim();
                                desc = `UK Transfer to ${bankName}`;
                                fromTo = `To: ${recipientName} • via ${bankName}`;
                            }
                            return `
                                <tr>
                                    <td>${formatDate(date)}</td>
                                    <td>
                                        <div>${desc}</div>
                                        <div class="muted">${fromTo}</div>
                                    </td>
                                    <td>${cleanType(tx.type)}</td>
                                    <td>${tx.reference || '-'}</td>
                                    <td>${pill(tx.status)}</td>
                                    <td class="amount ${cls}" style="text-align:right;">
                                        ${sign}$${formatMoney(Math.abs(parseFloat(tx.amount) + (credit ? 0 : (parseFloat(tx.fee) || 0))))}
                                        ${(parseFloat(tx.fee) || 0) > 0 ? `<div class="muted" style="font-size:11px;">Fee: $${formatMoney(parseFloat(tx.fee))}</div>` : ''}
                                    </td>
                                    <td>
                                        <button class="btn btn-secondary" style="padding:8px 10px;" onclick="downloadReceipt(${tx.id})" title="Download Receipt">
                                            <i class="fas fa-file-invoice"></i>
                                        </button>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        async function downloadReceipt(id) {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_URL}/api/transactions/${id}/receipt`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!response.ok) {
                alert('Error downloading receipt');
                return;
            }
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Heritage_Bank_Receipt_${id}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function downloadCurrentStatement() {
            location.href = 'statements.html';
        }

        init().catch(err => {
            console.error(err);
            alert('Failed to load transactions. Please sign in again.');
            location.href = 'signin.html';
        });
    </script>
    <footer style="background:#1a2332; padding:20px 0; margin-top:40px; text-align:center;">
        <div style="max-width:1200px; margin:0 auto; padding:0 20px;">
            <div style="margin-bottom:10px;">
                <a href="terms.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Terms</a>
                <a href="privacy.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Privacy</a>
                <a href="cookie-policy.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Cookies</a>
                <a href="accessibility.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Accessibility</a>
                <a href="disclosures.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Disclosures</a>
                <a href="security.html" style="color:#8899aa; text-decoration:none; margin:0 10px; font-size:0.8rem;">Security</a>
            </div>
            <p style="color:#556677; font-size:0.75rem; margin:0;">&copy; 2024 Heritage Bank. All rights reserved. Member FDIC. Equal Housing Lender.</p>
        </div>
    </footer>
</body>
</html>

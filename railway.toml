[build]
builder = "nixpacks"

[build.nixpacks]
node = "20"
buildCommands = ["npm install --omit=dev", "npm install --prefix backend --omit=dev"]

[deploy]
startCommand = "node backend/server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthCheckPath = "/api/health"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <link rel="manifest" href="manifest.json">

    <title>Sign In - Heritage Bank</title>
    <meta property="og:title" content="Sign In - Heritage Bank">
    <meta property="og:description" content="Sign in to your Heritage Bank account.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-image.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; background: linear-gradient(135deg, #0a1f14 0%, #1a472a 40%, #0d3320 70%, #0a1a10 100%); }
        /* Animated 3D floating orbs */
        .auth-bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: orbFloat 8s ease-in-out infinite; pointer-events: none; }
        .auth-bg-orb:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, rgba(26,71,42,0.8), rgba(13,51,32,0.3)); top: -15%; left: -10%; animation-duration: 10s; }
        .auth-bg-orb:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,175,55,0.5), rgba(212,175,55,0.1)); bottom: -12%; right: -8%; animation-duration: 12s; animation-delay: -3s; }
        .auth-bg-orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, rgba(5,150,105,0.4), rgba(5,150,105,0.1)); top: 50%; left: 60%; animation-duration: 14s; animation-delay: -6s; }
        .auth-bg-orb:nth-child(4) { width: 220px; height: 220px; background: radial-gradient(circle, rgba(212,175,55,0.35), transparent); top: 20%; right: 15%; animation-duration: 9s; animation-delay: -2s; }
        .auth-bg-orb:nth-child(5) { width: 260px; height: 260px; background: radial-gradient(circle, rgba(16,185,129,0.35), transparent); bottom: 25%; left: 10%; animation-duration: 11s; animation-delay: -5s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.08); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 30px) scale(1.04); }
        }
        /* Subtle grid overlay */
        .auth-container::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .auth-card { position: relative; z-index: 1; background: rgba(255,255,255,0.07); -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px); border-radius: 24px; padding: 44px 40px; max-width: 440px; width: 100%; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05) inset; }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-logo { margin-bottom: 12px; }
        .auth-logo a { display: inline-block; }
        .auth-logo img { height: 192px; filter: brightness(0) invert(1); }
        .auth-header p { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: rgba(255,255,255,0.85); font-weight: 600; font-size: 0.88rem; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; font-size: 0.92rem; font-family: inherit; transition: all 0.2s; background: rgba(255,255,255,0.06); color: white; }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus { outline: none; border-color: rgba(212,175,55,0.5); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); background: rgba(255,255,255,0.1); }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.4); }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; font-size: 0.85rem; }
        .remember-me { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.5); }
        .remember-me input[type="checkbox"] { accent-color: #d4af37; }
        .forgot-link { color: #d4af37; text-decoration: none; font-weight: 500; }
        .forgot-link:hover { text-decoration: underline; }
        .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, #d4af37, #c99c2a); color: #0f2b1a; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: linear-gradient(135deg, #e0bd4a, #d4af37); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,175,55,0.3); }
        .btn-primary:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }
        .auth-links { text-align: center; margin-top: 24px; font-size: 0.9rem; color: rgba(255,255,255,0.5); }
        .auth-links a { color: #d4af37; text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
        .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 18px; font-size: 0.88rem; }
        .alert-danger { background: rgba(220,53,69,0.15); color: #ff8a8a; border: 1px solid rgba(220,53,69,0.25); }
        .alert-warning { background: rgba(255,193,7,0.12); color: #ffc107; border: 1px solid rgba(255,193,7,0.2); }
        .login-attempts { text-align: center; color: #ff8a8a; font-size: 0.85rem; margin-top: 10px; }
        .security-notice { background: rgba(16,185,129,0.1); padding: 10px 14px; border-radius: 10px; margin-bottom: 20px; font-size: 0.82rem; color: rgba(16,185,129,0.9); border: 1px solid rgba(16,185,129,0.2); display: flex; align-items: center; gap: 8px; }
        .signin-legal { text-align: center; margin-top: 16px; font-size: 0.78rem; color: rgba(255,255,255,0.35); }
        .signin-legal a { color: rgba(255,255,255,0.5); }
        .signin-back-link { margin-top: 8px; }
        .signin-back-link a { color: rgba(255,255,255,0.5) !important; font-weight: 500 !important; }

        @media (max-width: 480px) {
            .auth-container { padding: 12px; }
            .auth-card { padding: 28px 22px; }
            .form-group input { padding: 11px 12px; }
            .btn-primary { padding: 12px; font-size: 0.9rem; }
            .form-options { font-size: 0.8rem; }
            .auth-bg-orb { filter: blur(60px); opacity: 0.4; }
        }
        .biometric-or-row { display: flex; align-items: center; gap: 12px; margin: 18px 0 10px; }
        .biometric-or-line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
        .biometric-or-text { color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 500; }
        .btn-biometric {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-biometric::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, #d4af37, transparent, #d4af37);
            z-index: -1;
            animation: bioPulse 2.5s ease-in-out infinite;
            opacity: 0.5;
        }
        @keyframes bioPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.03); }
        }
        .btn-biometric:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212,175,55,0.4);
            background: linear-gradient(135deg, #e0bd4a, #d4af37);
        }
        .btn-biometric .fa-fingerprint { font-size: 1.3rem; animation: fingerprintPulse 3s ease-in-out infinite; }
        @keyframes fingerprintPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .biometric-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.35);
        }
        .biometric-hint i { margin-right: 4px; color: rgba(16,185,129,0.6); }
        .alert-success { background: rgba(16,185,129,0.15); color: #7dffb3; border: 1px solid rgba(16,185,129,0.25); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="index.html"><img src="./assets/logo.png" alt="Heritage Bank"></a>
                </div>
                <p>Sign in to your account</p>
            </div>
            
            <div class="security-notice">
                <i class="fas fa-shield-alt"></i> Your session is encrypted and secure
            </div>
            
            <div id="alertBox"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address or Account Number</label>
                    <input type="text" id="email" placeholder="Enter email or account number" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                
                <div id="loginAttempts" class="login-attempts"></div>
            </form>

            <div class="biometric-divider initially-hidden" id="biometricSection">
                <div class="biometric-or-row">
                    <div class="biometric-or-line"></div>
                    <span class="biometric-or-text">or sign in instantly</span>
                    <div class="biometric-or-line"></div>
                </div>
                <button type="button" class="btn-biometric" id="biometricLoginBtn">
                    <i class="fas fa-fingerprint"></i> Sign in with Passkey
                </button>
                <p class="biometric-hint"><i class="fas fa-shield-alt"></i> Face ID, Touch ID, or Windows Hello — no password needed</p>
            </div>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                <p class="signin-back-link"><a href="index.html">← Back to Home</a></p>
            </div>
            <p class="signin-legal">By signing in, you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.</p>
        </div>
    </div>
    <script>
// Heritage Bank API URL - dynamic detection for localhost, Railway, and Vercel
const API_URL = (function() {
    const hostname = window.location.hostname;
    
    // Local development
    if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0') {
        return 'http://localhost:3001';
    }
    
    // Production (Railway, Vercel, etc.) - use current protocol and domain
    return `${window.location.protocol}//${window.location.host}`;
})();

console.log('[Auth] Detected API_URL:', API_URL);

// Initialize when DOM is ready
function initializeSignIn() {
    console.log('[Auth] Initializing sign-in page');
    
    // Check if already authenticated
    checkExistingAuth();
    
    // Initialize login form - bind directly to handler
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.onsubmit = function(e) {
            e.preventDefault();
            handleLoginSubmit(e);
            return false;
        };
        console.log('[Auth] Login form handler bound');
    } else {
        console.error('[Auth] Login form not found - page may not be fully loaded');
    }
    
    // Initialize password toggle
    const toggleBtn = document.getElementById('togglePassword');
    if (toggleBtn) {
        toggleBtn.onclick = function() {
            togglePasswordVisibility();
            return false;
        };
    }
    
    // Initialize biometric section
    if (window.PublicKeyCredential) {
        const bioSection = document.getElementById('biometricSection');
        if (bioSection) bioSection.style.display = 'block';
        
        // Bind biometric button click handler
        const bioBtn = document.getElementById('biometricLoginBtn');
        if (bioBtn) {
            bioBtn.onclick = function(e) {
                e.preventDefault();
                biometricLogin();
                return false;
            };
        }
    }
    
    // Restore remember-me state
    if (localStorage.getItem('rememberMe') === 'true') {
        const rememberCheckbox = document.getElementById('rememberMe');
        if (rememberCheckbox) rememberCheckbox.checked = true;
    }
    
    // Check for lockout
    checkAccountLockout();
}

// Run initialization immediately
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeSignIn);
} else {
    // DOM already loaded
    setTimeout(initializeSignIn, 0);
}

function checkExistingAuth() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    console.log('[Auth] Found existing token, checking validity');
    fetch(`${API_URL}/api/user/profile`, {
        method: 'GET',
        headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success && data.user) {
            console.log('[Auth] Token valid, redirecting to', data.user.isAdmin ? 'admin' : 'dashboard');
            window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
        } else {
            console.log('[Auth] Token invalid, clearing storage');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
        }
    })
    .catch(err => {
        console.error('[Auth] Error checking auth:', err);
        localStorage.removeItem('token');
    });
}

function checkAccountLockout() {
    const lockoutUntil = localStorage.getItem('lockoutUntil');
    const failedAttempts = parseInt(localStorage.getItem('failedAttempts') || '0');
    
    if (lockoutUntil && new Date() < new Date(lockoutUntil)) {
        const remainingMinutes = Math.ceil((new Date(lockoutUntil) - new Date()) / 60000);
        const alertBox = document.getElementById('alertBox');
        if (alertBox) {
            alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-lock"></i> Account temporarily locked. Try again in ${remainingMinutes} minute(s).</div>`;
        }
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) loginBtn.disabled = true;
        
        setTimeout(() => {
            localStorage.removeItem('lockoutUntil');
            location.reload();
        }, remainingMinutes * 60000);
    } else if (failedAttempts > 0) {
        const attemptsDiv = document.getElementById('loginAttempts');
        if (attemptsDiv) {
            attemptsDiv.innerHTML = `⚠️ ${failedAttempts} failed attempt(s). ${5 - failedAttempts} remaining before lockout.`;
        }
    }
}

function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('togglePassword');
    
    if (!passwordInput) return;
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

async function handleLoginSubmit(e) {
    e.preventDefault();
    console.log('[Auth] Login form submitted');
    
    const lockoutUntil = localStorage.getItem('lockoutUntil');
    if (lockoutUntil && new Date() < new Date(lockoutUntil)) {
        console.log('[Auth] Account is locked');
        return;
    }
    
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        if (alertBox) alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Please enter email and password</div>';
        return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    
    try {
        console.log('[Auth] Sending login request to', API_URL + '/api/auth/login');
        const response = await fetch(`${API_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            credentials: 'omit',
            body: JSON.stringify({
                email: email,
                password: password,
                rememberMe: document.getElementById('rememberMe')?.checked || false
            })
        });
        
        console.log('[Auth] Response status:', response.status);
        const data = await response.json();
        console.log('[Auth] Response data:', { success: data.success, message: data.message });
        
        if (data.success && data.token && data.user) {
            console.log('[Auth] Login successful');
            
            // Clear failed attempts
            localStorage.removeItem('failedAttempts');
            localStorage.removeItem('lockoutUntil');
            
            // Save session
            if (document.getElementById('rememberMe')?.checked) {
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('rememberMe');
            }
            
            localStorage.setItem('token', data.token);
            const safeUser = {
                id: data.user.id,
                firstName: data.user.firstName || '',
                lastName: data.user.lastName || '',
                email: data.user.email,
                accountNumber: data.user.accountNumber,
                accountType: data.user.accountType,
                isAdmin: !!data.user.isAdmin
            };
            localStorage.setItem('user', JSON.stringify(safeUser));
            
            if (alertBox) {
                alertBox.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>';
            }
            
            // Redirect after short delay
            setTimeout(() => {
                const destination = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
                console.log('[Auth] Redirecting to', destination);
                window.location.href = destination;
            }, 1200);
        } else {
            console.log('[Auth] Login failed:', data.message);
            let failedAttempts = parseInt(localStorage.getItem('failedAttempts') || '0');
            failedAttempts++;
            localStorage.setItem('failedAttempts', failedAttempts);
            
            if (failedAttempts >= 5) {
                const lockoutTime = new Date(Date.now() + 15 * 60000);
                localStorage.setItem('lockoutUntil', lockoutTime.toISOString());
                if (alertBox) {
                    alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-lock"></i> Too many failed attempts. Account locked for 15 minutes.</div>';
                }
                loginBtn.disabled = true;
                setTimeout(() => {
                    localStorage.removeItem('lockoutUntil');
                    localStorage.removeItem('failedAttempts');
                    location.reload();
                }, 15 * 60000);
            } else {
                const safeMsg = (data.message || 'Login failed').replace(/[<>"'&]/g, c => ({
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#39;',
                    '&': '&amp;'
                }[c]));
                if (alertBox) {
                    alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${safeMsg}</div>`;
                }
                const attemptsDiv = document.getElementById('loginAttempts');
                if (attemptsDiv) {
                    attemptsDiv.innerHTML = `⚠️ ${failedAttempts} failed attempt(s). ${5 - failedAttempts} remaining before lockout.`;
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }
    } catch (error) {
        console.error('[Auth] Login error:', error);
        if (alertBox) {
            alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Connection error: ${error.message}</div>`;
        }
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
}

// ===== Biometric / Passkey Login =====
        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        async function biometricLogin() {
            const email = document.getElementById('email').value;
            if (!email) {
                document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Please enter your email first, then click biometric login.</div>';
                document.getElementById('email').focus();
                return;
            }

            const btn = document.getElementById('biometricLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            try {
                // Step 1: Get authentication options
                const optRes = await fetch(`${API_URL}/api/auth/webauthn/login-options`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const optData = await optRes.json();

                if (!optData.success) {
                    if (optData.noBiometric) {
                        document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger"><i class="fas fa-fingerprint"></i> No biometric passkey registered. Set one up in Settings after logging in.</div>';
                    } else {
                        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${optData.message || 'Biometric login failed'}</div>`;
                    }
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> Sign in with Passkey';
                    return;
                }

                const options = optData.options;
                // Decode challenge
                options.challenge = Uint8Array.from(atob(options.challenge.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
                if (options.allowCredentials) {
                    options.allowCredentials = options.allowCredentials.map(c => ({
                        ...c,
                        id: Uint8Array.from(atob(c.id.replace(/-/g, '+').replace(/_/g, '/')), c2 => c2.charCodeAt(0))
                    }));
                }

                // Step 2: Authenticate with browser
                const assertion = await navigator.credentials.get({ publicKey: options });

                // Step 3: Send to server
                const assertionResponse = {
                    id: assertion.id,
                    rawId: bufferToBase64url(assertion.rawId),
                    type: assertion.type,
                    response: {
                        clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                        authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                        signature: bufferToBase64url(assertion.response.signature),
                        userHandle: assertion.response.userHandle ? bufferToBase64url(assertion.response.userHandle) : null
                    },
                    clientExtensionResults: assertion.getClientExtensionResults()
                };

                const verRes = await fetch(`${API_URL}/api/auth/webauthn/login-verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ assertionResponse })
                });
                const data = await verRes.json();

                if (data.success) {
                    localStorage.removeItem('failedAttempts');
                    localStorage.removeItem('lockoutUntil');
                    localStorage.setItem('token', data.token);
                    const safeUser = { id: data.user.id, firstName: data.user.firstName, lastName: data.user.lastName, email: data.user.email, accountNumber: data.user.accountNumber, accountType: data.user.accountType, isAdmin: !!data.user.isAdmin };
                    localStorage.setItem('user', JSON.stringify(safeUser));
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Biometric login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
                    }, 1000);
                } else {
                    document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> ${data.message || 'Biometric login failed'}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> Sign in with Passkey';
                }
            } catch (e) {
                if (e.name === 'NotAllowedError') {
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger"><i class="fas fa-hand-paper"></i> Biometric authentication was cancelled.</div>';
                } else {
                    console.error('Passkey login error:', e);
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Biometric login error: ' + (e.message || 'Please try again.') + '</div>';
                }
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fingerprint"></i> Sign in with Passkey';
            }
        }
    </script>
    <script src="cookie-consent.js"></script>
</body>
</html>

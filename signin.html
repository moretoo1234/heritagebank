<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Sign in to your Heritage Bank account to manage your finances securely.">
    <title>Sign In - Heritage Bank</title>
    <meta property="og:title" content="Sign In - Heritage Bank">
    <meta property="og:description" content="Sign in to your Heritage Bank account securely.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-image.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding: 20px; }
        .auth-card { background: white; border-radius: 20px; padding: 44px 40px; max-width: 440px; width: 100%; border: 1px solid #e2e8f0; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header h1 { color: #1a472a; font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.02em; }
        .auth-header p { color: #64748b; font-size: 0.95rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #1e293b; font-weight: 600; font-size: 0.88rem; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.92rem; font-family: inherit; transition: all 0.2s; background: #f8fafc; }
        .form-group input:focus { outline: none; border-color: #1a472a; box-shadow: 0 0 0 3px rgba(26,71,42,0.08); background: white; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; font-size: 0.85rem; }
        .remember-me { display: flex; align-items: center; gap: 6px; color: #64748b; }
        .forgot-link { color: #1a472a; text-decoration: none; font-weight: 500; }
        .forgot-link:hover { text-decoration: underline; }
        .btn-primary { width: 100%; padding: 13px; background: #1a472a; color: white; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: #0f2b1a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,71,42,0.2); }
        .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        .auth-links { text-align: center; margin-top: 24px; font-size: 0.9rem; color: #64748b; }
        .auth-links a { color: #1a472a; text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
        .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 18px; font-size: 0.88rem; }
        .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .login-attempts { text-align: center; color: #dc3545; font-size: 0.85rem; margin-top: 10px; }
        .security-notice { background: #f0fdf4; padding: 10px 14px; border-radius: 10px; margin-bottom: 20px; font-size: 0.82rem; color: #166534; border: 1px solid #bbf7d0; display: flex; align-items: center; gap: 8px; }

        @media (max-width: 480px) {
            .auth-container { padding: 12px; }
            .auth-card { padding: 28px 22px; }
            .auth-header h1 { font-size: 1.35rem; }
            .form-group input { padding: 11px 12px; }
            .btn-primary { padding: 12px; font-size: 0.9rem; }
            .form-options { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-landmark"></i> Heritage Bank</h1>
                <p>Sign in to your account</p>
            </div>
            
            <div class="security-notice">
                <i class="fas fa-shield-alt"></i> Your session is encrypted and secure
            </div>
            
            <div id="alertBox"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address or Account Number</label>
                    <input type="text" id="email" placeholder="Enter email or account number" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                
                <div id="loginAttempts" class="login-attempts"></div>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                <p class="signin-back-link"><a href="index.html">← Back to Home</a></p>
            </div>
            <p class="signin-legal">By signing in, you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.</p>
        </div>
    </div>
    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001' 
            : window.location.origin;

        // Redirect authenticated users to dashboard
        (function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch(`${API_URL}/api/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => r.json()).then(data => {
                    if (data.success && data.user) {
                        window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
                    }
                }).catch(() => {});
            }
        })();

        let failedAttempts = parseInt(localStorage.getItem('failedAttempts') || '0');
        let lockoutUntil = localStorage.getItem('lockoutUntil');

        // Check if account is locked
        if (lockoutUntil && new Date() < new Date(lockoutUntil)) {
            const remainingMinutes = Math.ceil((new Date(lockoutUntil) - new Date()) / 60000);
            document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-lock"></i> Account temporarily locked. Try again in ${remainingMinutes} minute(s).</div>`;
            document.getElementById('loginBtn').disabled = true;
            setTimeout(() => {
                localStorage.removeItem('lockoutUntil');
                location.reload();
            }, remainingMinutes * 60000);
        }

        // Show failed attempts warning
        if (failedAttempts > 0) {
            document.getElementById('loginAttempts').innerHTML = `⚠️ ${failedAttempts} failed attempt(s). Account will lock after 5 attempts.`;
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Check lockout
            if (lockoutUntil && new Date() < new Date(lockoutUntil)) {
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        rememberMe: document.getElementById('rememberMe').checked
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    // Clear failed attempts
                    localStorage.removeItem('failedAttempts');
                    localStorage.removeItem('lockoutUntil');
                    
                    // Save session
                    if (document.getElementById('rememberMe').checked) {
                        localStorage.setItem('rememberMe', 'true');
                    }
                    localStorage.setItem('token', data.token);
                    const safeUser = { id: data.user.id, firstName: data.user.firstName, lastName: data.user.lastName, email: data.user.email, accountNumber: data.user.accountNumber, accountType: data.user.accountType };
                    localStorage.setItem('user', JSON.stringify(safeUser));
                    
                    // Show success
                    document.getElementById('alertBox').innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>`;
                    
                    // Show last login if available
                    if (data.lastLogin) {
                        document.getElementById('alertBox').innerHTML += `<div class="security-notice">Last login: ${new Date(data.lastLogin).toLocaleString()}</div>`;
                    }
                    
                    setTimeout(() => {
                        window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
                    }, 1500);
                } else {
                    // Increment failed attempts
                    failedAttempts++;
                    localStorage.setItem('failedAttempts', failedAttempts);
                    
                    if (failedAttempts >= 5) {
                        // Lock account for 15 minutes
                        const lockoutTime = new Date(Date.now() + 15 * 60000);
                        localStorage.setItem('lockoutUntil', lockoutTime.toISOString());
                        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-lock"></i> Too many failed attempts. Account locked for 15 minutes.</div>`;
                        document.getElementById('loginBtn').disabled = true;
                        setTimeout(() => {
                            localStorage.removeItem('lockoutUntil');
                            localStorage.removeItem('failedAttempts');
                            location.reload();
                        }, 15 * 60000);
                    } else {
                        const safeMsg = (data.message || 'Login failed').replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));
                        document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${safeMsg}</div>`;
                        document.getElementById('loginAttempts').innerHTML = `⚠️ ${failedAttempts} failed attempt(s). ${5 - failedAttempts} remaining before lockout.`;
                    }
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            } catch (e) {
                document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><i class="fas fa-times-circle"></i> Connection error. Please try again.</div>`;
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });

        // Auto-fill if remember me was checked
        window.addEventListener('load', () => {
            if (localStorage.getItem('rememberMe') === 'true') {
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
    <script src="cookie-consent.js"></script>
</body>
</html>

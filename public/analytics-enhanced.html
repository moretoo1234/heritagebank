<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending Analytics - Heritage Bank</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="app-layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        .analytics-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .analytics-header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .analytics-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a472a;
            margin: 0 0 10px 0;
        }

        .analytics-subtitle {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .period-selector {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .period-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .period-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .period-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card .label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a472a;
            margin: 0;
        }

        .stat-card.income .value {
            color: #28a745;
        }

        .stat-card.expense .value {
            color: #dc3545;
        }

        .stat-card .icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .chart-card h3 {
            margin: 0 0 20px 0;
            font-size: 18px;
            color: #1a472a;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .categories-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .categories-section h3 {
            margin: 0 0 20px 0;
            font-size: 18px;
            color: #1a472a;
            font-weight: 600;
        }

        .category-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .category-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .category-item .name {
            font-size: 14px;
            color: #666;
            margin: 0 0 8px 0;
            font-weight: 500;
        }

        .category-item .amount {
            font-size: 20px;
            color: #1a472a;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        .category-item .count {
            font-size: 12px;
            color: #999;
            margin: 0;
        }

        .insight-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .insight-box strong {
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
        }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            color: #999;
        }

        .trend-indicator {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .trend-up {
            background: #d4edda;
            color: #155724;
        }

        .trend-down {
            background: #f8d7da;
            color: #721c24;
        }

        .currency-converter {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .converter-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .converter-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .converter-btn:hover {
            background: #764ba2;
        }

        .converter-result {
            grid-column: 1 / -1;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 6px;
            color: #1a472a;
            font-weight: 600;
            display: none;
        }

        .converter-result.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="analytics-container">
        <div class="app-sidebar" id="sidebar"></div>

        <main class="app-main">
            <div class="analytics-header">
                <h1 class="analytics-title">Spending Analytics</h1>
                <p class="analytics-subtitle">Monitor your income, expenses, and financial trends</p>

                <div class="period-selector">
                    <button class="period-btn active" data-period="month">This Month</button>
                    <button class="period-btn" data-period="week">This Week</button>
                    <button class="period-btn" data-period="quarter">Quarterly</button>
                    <button class="period-btn" data-period="year">Yearly</button>
                    <button class="period-btn" data-period="all">All Time</button>
                </div>
            </div>

            <div id="error" class="error" style="display: none;"></div>
            <div id="loading" class="loading">Loading analytics...</div>

            <div id="content" style="display: none;">
                <!-- Key Statistics -->
                <div class="analytics-grid">
                    <div class="stat-card income">
                        <div class="label">💰 Total Income</div>
                        <div class="value" id="totalIncome">$0.00</div>
                    </div>
                    <div class="stat-card expense">
                        <div class="label">💸 Total Expenses</div>
                        <div class="value" id="totalExpenses">$0.00</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">📊 Net Flow</div>
                        <div class="value" id="netFlow">$0.00</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">📈 Transactions</div>
                        <div class="value" id="transactionCount">0</div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="charts-section">
                    <div class="chart-card">
                        <h3>Income vs Expenses Trend</h3>
                        <div class="chart-container">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>Spending by Category</h3>
                        <div class="chart-container">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Categories Section -->
                <div class="categories-section">
                    <h3>Top Spending Categories</h3>
                    <div class="category-list" id="categoryList">
                        <p class="no-data">No spending data available</p>
                    </div>
                </div>

                <!-- Currency Converter -->
                <div class="currency-converter">
                    <h3>Currency Converter</h3>
                    <div class="converter-form">
                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" id="convertAmount" placeholder="100" value="100">
                        </div>
                        <div class="form-group">
                            <label>From Currency</label>
                            <select id="fromCurrency">
                                <option value="USD">USD - US Dollar</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - British Pound</option>
                                <option value="JPY">JPY - Japanese Yen</option>
                                <option value="CAD">CAD - Canadian Dollar</option>
                                <option value="AUD">AUD - Australian Dollar</option>
                                <option value="CHF">CHF - Swiss Franc</option>
                                <option value="CNY">CNY - Chinese Yuan</option>
                                <option value="INR">INR - Indian Rupee</option>
                                <option value="MXN">MXN - Mexican Peso</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>To Currency</label>
                            <select id="toCurrency">
                                <option value="USD">USD - US Dollar</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="GBP">GBP - British Pound</option>
                                <option value="JPY">JPY - Japanese Yen</option>
                                <option value="CAD">CAD - Canadian Dollar</option>
                                <option value="AUD">AUD - Australian Dollar</option>
                                <option value="CHF">CHF - Swiss Franc</option>
                                <option value="CNY">CNY - Chinese Yuan</option>
                                <option value="INR">INR - Indian Rupee</option>
                                <option value="MXN">MXN - Mexican Peso</option>
                            </select>
                        </div>
                        <button class="converter-btn" onclick="convertCurrency()">Convert</button>
                        <div class="converter-result" id="converterResult"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app-sidebar.js"></script>
    <script>
        const API_URL = window.location.origin;
        let trendChart = null;
        let categoryChart = null;
        let currentPeriod = 'month';

        async function loadAnalytics(period) {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const error = document.getElementById('error');

            loading.style.display = 'block';
            content.style.display = 'none';
            error.style.display = 'none';

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_URL}/api/analytics?period=${period}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Failed to load analytics');
                }

                displayAnalytics(data);
                loading.style.display = 'none';
                content.style.display = 'block';
            } catch (e) {
                console.error('Analytics error:', e);
                error.textContent = `Error: ${e.message}`;
                error.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        function displayAnalytics(data) {
            // Update stat cards
            document.getElementById('totalIncome').textContent = `$${parseFloat(data.totalIncome).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            document.getElementById('totalExpenses').textContent = `$${parseFloat(data.totalExpenses).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            document.getElementById('netFlow').textContent = `$${parseFloat(data.netFlow).toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
            document.getElementById('transactionCount').textContent = data.transactionCount || '0';

            // Update trend chart
            updateTrendChart(data.trend);

            // Update category chart
            updateCategoryChart(data.categories);

            // Update category list
            updateCategoryList(data.categories);
        }

        function updateTrendChart(trend) {
            const ctx = document.getElementById('trendChart').getContext('2d');

            if (trendChart) {
                trendChart.destroy();
            }

            const labels = trend.map(t => t.label);
            const incomeData = trend.map(t => parseFloat(t.income));
            const expenseData = trend.map(t => parseFloat(t.expenses));

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        {
                            label: 'Income',
                            data: incomeData,
                            borderColor: '#28a745',
                            backgroundColor: 'rgba(40, 167, 69, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 5,
                            pointBackgroundColor: '#28a745'
                        },
                        {
                            label: 'Expenses',
                            data: expenseData,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 5,
                            pointBackgroundColor: '#dc3545'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 14, weight: '600' }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateCategoryChart(categories) {
            if (categories.length === 0) return;

            const ctx = document.getElementById('categoryChart').getContext('2d');

            if (categoryChart) {
                categoryChart.destroy();
            }

            const colors = [
                '#667eea', '#764ba2', '#f093fb', '#4facfe',
                '#43e97b', '#fa709a', '#30cfd0', '#330867'
            ];

            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories.map(c => c.category || 'Other'),
                    datasets: [{
                        data: categories.map(c => parseFloat(c.total)),
                        backgroundColor: colors.slice(0, categories.length),
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 13 }
                            }
                        }
                    }
                }
            });
        }

        function updateCategoryList(categories) {
            const list = document.getElementById('categoryList');

            if (!categories || categories.length === 0) {
                list.innerHTML = '<p class="no-data">No spending data available</p>';
                return;
            }

            list.innerHTML = categories.map(cat => `
                <div class="category-item">
                    <div class="name">${cat.category || 'Other'}</div>
                    <div class="amount">$${parseFloat(cat.total).toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                    <div class="count">${cat.count} ${cat.count === 1 ? 'transaction' : 'transactions'}</div>
                </div>
            `).join('');
        }

        function convertCurrency() {
            const amount = parseFloat(document.getElementById('convertAmount').value);
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;

            // Mock exchange rates (in production, use real API)
            const rates = {
                'USD': 1,
                'EUR': 0.92,
                'GBP': 0.79,
                'JPY': 149.50,
                'CAD': 1.36,
                'AUD': 1.53,
                'CHF': 0.88,
                'CNY': 7.24,
                'INR': 83.12,
                'MXN': 17.05
            };

            const converted = (amount / rates[from]) * rates[to];
            const result = document.getElementById('converterResult');
            result.textContent = `${amount.toFixed(2)} ${from} = ${converted.toFixed(2)} ${to}`;
            result.classList.add('show');
        }

        // Period selector
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;
                loadAnalytics(currentPeriod);
            });
        });

        // Initial load
        loadAnalytics('month');
    </script>
</body>
</html>

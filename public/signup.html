<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="Create your Heritage Bank account today.">
    <title>Sign Up - Heritage Bank</title>
    <meta property="og:title" content="Sign Up - Heritage Bank">
    <meta property="og:description" content="Create your Heritage Bank account today.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/og-image.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; background: linear-gradient(135deg, #0a1f14 0%, #1a472a 40%, #0d3320 70%, #0a1a10 100%); }
        /* Animated 3D floating orbs */
        .auth-bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: orbFloat 8s ease-in-out infinite; pointer-events: none; }
        .auth-bg-orb:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, rgba(26,71,42,0.8), rgba(13,51,32,0.3)); top: -15%; left: -10%; animation-duration: 10s; }
        .auth-bg-orb:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,175,55,0.5), rgba(212,175,55,0.1)); bottom: -12%; right: -8%; animation-duration: 12s; animation-delay: -3s; }
        .auth-bg-orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, rgba(5,150,105,0.4), rgba(5,150,105,0.1)); top: 50%; left: 60%; animation-duration: 14s; animation-delay: -6s; }
        .auth-bg-orb:nth-child(4) { width: 220px; height: 220px; background: radial-gradient(circle, rgba(212,175,55,0.35), transparent); top: 20%; right: 15%; animation-duration: 9s; animation-delay: -2s; }
        .auth-bg-orb:nth-child(5) { width: 260px; height: 260px; background: radial-gradient(circle, rgba(16,185,129,0.35), transparent); bottom: 25%; left: 10%; animation-duration: 11s; animation-delay: -5s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.08); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 30px) scale(1.04); }
        }
        /* Subtle grid overlay */
        .auth-container::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .auth-card { position: relative; z-index: 1; background: rgba(255,255,255,0.07); -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px); border-radius: 24px; padding: 44px 40px; max-width: 480px; width: 100%; border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05) inset; }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-logo { margin-bottom: 12px; }
        .auth-logo a { display: inline-block; }
        .auth-logo img { height: 192px; filter: brightness(0) invert(1); }
        .auth-header p { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: rgba(255,255,255,0.85); font-weight: 600; font-size: 0.88rem; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; font-size: 0.92rem; font-family: inherit; transition: all 0.2s; background: rgba(255,255,255,0.06); color: white; }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus { outline: none; border-color: rgba(212,175,55,0.5); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); background: rgba(255,255,255,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.4); }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 8px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .password-strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0; }
        .password-strength-text { font-size: 0.78rem; margin-top: 4px; color: rgba(255,255,255,0.4); }
        .checkbox-group { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 20px; }
        .checkbox-group input[type="checkbox"] { width: auto; margin-top: 3px; accent-color: #d4af37; }
        .checkbox-group label { margin: 0; font-weight: normal; font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.4; }
        .checkbox-group a { color: #d4af37; font-weight: 500; }
        .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, #d4af37, #c99c2a); color: #0f2b1a; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:hover { background: linear-gradient(135deg, #e0bd4a, #d4af37); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,175,55,0.3); }
        .btn-primary:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }
        .divider { text-align: center; margin: 20px 0; color: rgba(255,255,255,0.3); font-size: 0.85rem; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255,255,255,0.1); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .btn-full-form { width: 100%; padding: 13px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; font-size: 0.92rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-full-form:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .auth-links { text-align: center; margin-top: 24px; font-size: 0.9rem; color: rgba(255,255,255,0.5); }
        .auth-links a { color: #d4af37; text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
        .auth-links .back-link { margin-top: 8px; }
        .auth-links .back-link a { color: rgba(255,255,255,0.5); font-weight: 500; }
        .alert { padding: 12px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 0.88rem; }
        .alert-danger { background: rgba(220,53,69,0.15); color: #ff8a8a; border: 1px solid rgba(220,53,69,0.25); }
        .alert-success { background: rgba(16,185,129,0.12); color: rgba(16,185,129,0.9); border: 1px solid rgba(16,185,129,0.25); }
        .security-notice { background: rgba(16,185,129,0.1); padding: 10px 14px; border-radius: 10px; margin-bottom: 20px; font-size: 0.82rem; color: rgba(16,185,129,0.9); border: 1px solid rgba(16,185,129,0.2); display: flex; align-items: center; gap: 8px; }

        @media (max-width: 480px) {
            .auth-container { padding: 12px; }
            .auth-card { padding: 28px 22px; }
            .form-row { grid-template-columns: 1fr; }
            .btn-primary { padding: 12px; font-size: 0.9rem; }
            .auth-bg-orb { filter: blur(60px); opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-bg-orb"></div>
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <a href="index.html"><img src="./assets/logo.png" alt="Heritage Bank"></a>
                </div>
                <p>Create your account</p>
            </div>

            <div class="security-notice">
                <i class="fas fa-shield-alt"></i> Your information is encrypted and secure
            </div>

            <div id="alertBox"></div>

            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" placeholder="John" required autocomplete="given-name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" placeholder="Doe" required autocomplete="family-name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required autocomplete="tel">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required class="auth-select" aria-label="Gender">
                        <option value="" disabled selected class="auth-select-placeholder">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password" minlength="8">
                        <i class="fas fa-eye password-toggle" onclick="togglePw('password')"></i>
                    </div>
                    <div class="password-strength"><div class="password-strength-fill" id="strengthFill"></div></div>
                    <div class="password-strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                        <i class="fas fa-eye password-toggle" onclick="togglePw('confirmPassword')"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-primary" id="signupBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="divider">or</div>

            <a href="open-account-enhanced.html" class="btn-full-form">
                <i class="fas fa-file-alt"></i> Full Application Form
            </a>

            <div class="auth-links">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
                <p class="back-link"><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script>
        // XSS Protection
        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        var API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:3001' : window.location.origin;

        // Redirect if already logged in
        (function() {
            var token = localStorage.getItem('token');
            if (token) {
                fetch(API_URL + '/api/auth/profile', { headers: { 'Authorization': 'Bearer ' + token } })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.user) {
                            window.location.href = data.user.isAdmin ? 'admin.html' : 'dashboard.html';
                        }
                    }).catch(function(){});
            }
        })();

        function togglePw(id) {
            var input = document.getElementById(id);
            var icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Password strength
        document.getElementById('password').addEventListener('input', function() {
            var pw = this.value;
            var score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            var fill = document.getElementById('strengthFill');
            var text = document.getElementById('strengthText');
            var colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
            var labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
            var pct = Math.min(score, 5) * 20;
            fill.style.width = pct + '%';
            fill.style.background = colors[Math.min(score, 4)];
            text.textContent = pw.length > 0 ? labels[Math.min(score, 4)] : '';
            text.style.color = colors[Math.min(score, 4)];
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var alertBox = document.getElementById('alertBox');
            var btn = document.getElementById('signupBtn');

            var firstName = document.getElementById('firstName').value.trim();
            var lastName = document.getElementById('lastName').value.trim();
            var email = document.getElementById('email').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var gender = document.getElementById('gender').value;
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Passwords do not match.</div>';
                return;
            }
            if (password.length < 8) {
                alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Password must be at least 8 characters.</div>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            alertBox.innerHTML = '';

            fetch(API_URL + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    firstName: firstName,
                    lastName: lastName,
                    email: email,
                    phone: phone,
                    password: password,
                    gender: gender
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        var safeUser = { id: data.user.id, firstName: data.user.firstName, lastName: data.user.lastName, email: data.user.email, accountNumber: data.user.accountNumber, accountType: data.user.accountType };
                        localStorage.setItem('user', JSON.stringify(safeUser));
                    }
                    alertBox.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Account created successfully! Redirecting...</div>';
                    setTimeout(function() { window.location.href = data.token ? 'dashboard.html' : 'signin.html'; }, 2000);
                } else {
                    alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ' + escapeHtml(data.message || 'Registration failed.') + '</div>';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            })
            .catch(function() {
                alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Connection error. Please try again.</div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            });
        });
    </script>
    <script src="cookie-consent.js"></script>
</body>
</html>

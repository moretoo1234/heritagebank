<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Page Not Found - Heritage Bank">
    <meta property="og:description" content="The page you're looking for could not be found. Return to Heritage Bank homepage.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="manifest" href="manifest.json">
    <title>Page Not Found - Heritage Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        .error-logo {
            text-align: center;
            padding: 28px 20px 0;
        }
        .error-logo a { display: inline-block; }
        .error-logo img { height: 96px; }
        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .error-content {
            text-align: center;
            max-width: 520px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #1a472a;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }
        .error-code span {
            color: #d4af37;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: #1a472a;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: #0f2b1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,71,42,0.25);
        }
        .btn-secondary {
            background: white;
            color: #1a472a;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }
        .error-illustration {
            font-size: 5rem;
            margin-bottom: 24px;
        }
        .error-links {
            margin-top: 40px;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .error-links a:hover {
            color: #1a472a;
        }
        .error-footer {
            text-align: center;
            padding: 24px;
            color: #94a3b8;
            font-size: 0.82rem;
        }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.2rem; }
            .error-actions { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="error-logo">
        <a href="index.html"><img src="./assets/logo.png" alt="Heritage Bank"></a>
    </div>
    <div class="error-container">
        <div class="error-content">
            <div class="error-illustration">
                <i class="fas fa-map-signs icon-map-signs"></i>
            </div>
            <div class="error-code">4<span>0</span>4</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                The page you're looking for doesn't exist or has been moved. 
                Don't worry — let's get you back on track.
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="dashboard.html" class="btn-secondary">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
            </div>
            <div class="error-links">
                <a href="contact.html">Contact Support</a>
                <a href="faq.html">FAQ</a>
                <a href="branches.html">Find a Branch</a>
            </div>
        </div>
    </div>
    <div class="error-footer">
        &copy; 2026 Heritage Bank. All rights reserved. Member FDIC.
    </div>
    <script src="cookie-consent.js"></script>
</body>
</html>
